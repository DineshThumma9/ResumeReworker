services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resumereworker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumereworker
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - ENV_FILE=.env
      # Database is reachable at the service name "db" inside Docker network,
      # not localhost. Set this so the backend picks it up.
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/resumereworker
      # Redis is reachable at the service name "redis" inside Docker network,
      # not localhost. Set this so the FastAPI lifespan picks it up.
      - REDIS_URL=redis://redis:6379
    volumes:
      # Sibling container control: let the backend run docker commands on the host daemon
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  latex-compiler:
    build:
      context: ./backend
      dockerfile: Dockerfile.latex
    image: latex-compiler
    # This service builds and tags the image for the host docker daemon.
    # It does not need to run continuously in compose.
    restart: "no"
    entrypoint: ["echo", "LaTeX compiler image built and tagged successfully"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resumereworker-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - web

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - frontend
    ports:
      - "80:80"
      - "443:443"

volumes:
  pgdata:
  redis_data:
  caddy_data:
  caddy_config:
