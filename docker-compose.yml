services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resumereworker
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6.2-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  docker-proxy:
    image: tecnativa/docker-socket-proxy
    restart: unless-stopped
    environment:
      # Allow checking container/image status
      - CONTAINERS=1
      - IMAGES=1
      # Allow creating and starting containers (needed for docker run)
      - POST=1
      # Explicit defaults for security auditing
      - VOLUMES=0
      - EXEC=0
      - PRIVILEGED=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumereworker
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      - ENV_FILE=.env
      # Database is reachable at the service name "db" inside Docker network,
      # not localhost. Set this so the backend picks it up.
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/resumereworker
      # Redis is reachable at the service name "redis" inside Docker network,
      # not localhost. Set this so the FastAPI lifespan picks it up.
      - REDIS_URL=redis://redis:6379
      # Connect to the docker socket proxy instead of local socket
      - DOCKER_HOST=tcp://docker-proxy:2375
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      docker-proxy:
        condition: service_started

  latex-compiler:
    build:
      context: ./backend
      dockerfile: Dockerfile.latex
    image: latex-compiler
    # This service builds and tags the image for the host docker daemon.
    # It does not need to run continuously in compose.
    restart: "no"
    entrypoint: ["echo", "LaTeX compiler image built and tagged successfully"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resumereworker-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - web
volumes:
  pgdata:
  redis_data:
