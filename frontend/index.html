<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResumeReworker - AI-Powered Resume Tailoring</title>
    <meta name="description" content="ResumeReworker uses AI to tailor your resume for specific job descriptions instantly. Build ATS-friendly, LaTeX-powered resumes in seconds." />
    <meta name="keywords" content="Resume, AI, Tailor, ATS, Job Search, LaTeX, Resume Builder" />

    <meta name="robots" content="index, follow" />
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
